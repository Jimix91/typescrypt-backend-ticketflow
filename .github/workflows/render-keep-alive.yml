name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Missing secret RENDER_HEALTHCHECK_URL"
            exit 1
          fi

          echo "Pinging $HEALTHCHECK_URL with retries"

          for attempt in 1 2 3; do
            echo "Attempt $attempt/3"

            if curl --silent --show-error --fail \
              --connect-timeout 15 \
              --max-time 75 \
              -H "User-Agent: github-actions-keepalive" \
              "$HEALTHCHECK_URL"; then
              echo "Keep-alive ping succeeded"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Ping failed, waiting 20s before retry"
              sleep 20
            fi
          done

          echo "All keep-alive attempts failed"
          exit 1
